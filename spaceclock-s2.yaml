dashboard_import:
  package_import_url: github://willtho89/SpaceClock/spaceclock-s2-import.yaml@main
  import_full_config: false

packages:
  base: !include packages/spaceclock-base.yaml

substitutions:
  device_name: spaceclock
  friendly_name: SpaceClock
  led_pin: GPIO16
  button_pin: GPIO0
  num_leds: "45"
  matrix_height: "5"
  active_y_offset: "1"
  serpentine_phase: "0"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

esp32:
  board: lolin_s2_mini
  framework:
    type: esp-idf

external_components:
  - source:
      type: local
      path: components
    components: [spaceclock_support]
