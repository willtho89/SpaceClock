dashboard_import:
  package_import_url: github://willtho89/SpaceClock/spaceclock-example-import.yaml@main
  import_full_config: false

packages:
  base:
    url: https://github.com/willtho89/SpaceClock
    ref: main
    files:
      - packages/spaceclock-base.yaml

substitutions:
  device_name: spaceclock-custom
  friendly_name: SpaceClock Custom
  led_pin: GPIO4
  button_pin: GPIO3
  num_leds: "27"
  matrix_height: "3"
  active_y_offset: "0"
  serpentine_phase: "1"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf
